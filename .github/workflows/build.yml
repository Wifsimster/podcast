name: Build APK

on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # Debug APK first — it is fully installable on its own and is the
      # guaranteed deliverable even if the minified release build hiccups.
      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: carne-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Build release APK (R8 minified)
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: carne-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      # Android App Bundle — the artifact uploaded to the Play Store. Signed
      # with the upload key when the signing secrets are present; otherwise it
      # falls back to the debug key and is suitable for inspection only, not
      # for Play submission. Configure repo secrets KEYSTORE_BASE64 (the .jks
      # base64-encoded), KEYSTORE_PASSWORD, KEY_ALIAS and KEY_PASSWORD.
      - name: Build release AAB (App Bundle)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "${{ github.workspace }}/upload-keystore.jks"
            export KEYSTORE_FILE="${{ github.workspace }}/upload-keystore.jks"
          else
            echo "No KEYSTORE_BASE64 secret set — AAB will be debug-signed (not store-ready)."
          fi
          ./gradlew bundleRelease --stacktrace

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: carne-release-aab
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Publish rolling release (main only)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Carne — latest build
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          body: >
            Latest automatically built APK. Download an APK below
            (`app-debug.apk` is simplest), allow "install from unknown sources"
            on your phone, then open it to install.

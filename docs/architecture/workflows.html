<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ondes · Component & Workflow Map</title>
<style>
  :root {
    --bg: #0e1116;
    --panel: #161b22;
    --panel-2: #1c2430;
    --node: #1e2733;
    --node-border: #2d3a48;
    --text: #e6edf3;
    --muted: #8b97a6;
    --accent: #7aa2ff;
    --accent-2: #58e6c4;
    --hot: #ffb454;
    --dim-opacity: 0.18;
    --layer-line: #232c38;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--layer-line);
    background: linear-gradient(180deg, #131820, #0e1116);
    display: flex;
    align-items: baseline;
    gap: 14px;
    flex-wrap: wrap;
  }
  header h1 { margin: 0; font-size: 18px; letter-spacing: .2px; }
  header h1 .radio { color: var(--accent); }
  header .sub { color: var(--muted); font-size: 13px; }
  header .pkg {
    margin-left: auto; color: var(--muted); font-size: 12px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }

  .layout { flex: 1; display: flex; min-height: 0; }

  /* Sidebar */
  aside {
    width: 320px;
    flex: none;
    background: var(--panel);
    border-right: 1px solid var(--layer-line);
    overflow-y: auto;
    padding: 14px;
  }
  aside .intro { color: var(--muted); font-size: 12.5px; margin: 0 0 14px; }
  aside h2 {
    font-size: 11px; text-transform: uppercase; letter-spacing: .8px;
    color: var(--muted); margin: 18px 4px 8px;
  }
  .flow-btn {
    display: block; width: 100%; text-align: left;
    background: var(--panel-2); color: var(--text);
    border: 1px solid transparent; border-radius: 10px;
    padding: 10px 12px; margin-bottom: 8px; cursor: pointer;
    transition: border-color .15s, background .15s, transform .05s;
  }
  .flow-btn:hover { border-color: #38465a; }
  .flow-btn:active { transform: translateY(1px); }
  .flow-btn.active {
    border-color: var(--accent);
    background: linear-gradient(180deg, #1d2b4a, #182238);
  }
  .flow-btn .t { font-weight: 600; font-size: 13.5px; }
  .flow-btn .s { color: var(--muted); font-size: 12px; margin-top: 3px; }

  .reset {
    margin-top: 6px; width: 100%; padding: 8px;
    background: transparent; color: var(--muted);
    border: 1px dashed #38465a; border-radius: 8px; cursor: pointer;
  }
  .reset:hover { color: var(--text); border-color: #4a5b72; }

  /* Stage */
  main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .stage-wrap { flex: 1; overflow: auto; padding: 22px; position: relative; }
  #diagram { position: relative; min-width: 760px; }

  svg.wires {
    position: absolute; inset: 0; width: 100%; height: 100%;
    pointer-events: none; overflow: visible; z-index: 3;
  }
  svg.wires path.wire {
    fill: none; stroke: var(--accent);
    stroke-width: 2.5; stroke-linecap: round;
    opacity: .9;
    stroke-dasharray: var(--len); stroke-dashoffset: var(--len);
    animation: draw .5s ease forwards;
  }
  svg.wires path.wire.hot { stroke: var(--hot); stroke-width: 3.5; opacity: 1; }
  @keyframes draw { to { stroke-dashoffset: 0; } }
  svg.wires .badge circle { fill: var(--accent); stroke: #0e1116; stroke-width: 2; }
  svg.wires .badge.hot circle { fill: var(--hot); }
  svg.wires .badge text { fill: #0e1116; font-weight: 700; font-size: 11px; }

  .layer { margin-bottom: 26px; position: relative; }
  .layer-label {
    font-size: 10.5px; text-transform: uppercase; letter-spacing: .7px;
    color: var(--muted); margin-bottom: 9px; padding-left: 2px;
  }
  .layer-nodes { display: flex; flex-wrap: wrap; gap: 10px; }

  .node {
    position: relative; z-index: 2;
    background: var(--node);
    border: 1px solid var(--node-border);
    border-radius: 10px;
    padding: 9px 12px; min-width: 120px;
    transition: opacity .2s, border-color .2s, box-shadow .2s, transform .1s;
  }
  .node .nl { font-weight: 600; font-size: 13px; }
  .node .ns {
    color: var(--muted); font-size: 11px; margin-top: 2px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .node.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 6px 22px -8px var(--accent);
  }
  .node.endpoint { border-color: var(--hot); box-shadow: 0 0 0 1px var(--hot), 0 6px 22px -8px var(--hot); }
  .filtering .node:not(.active) { opacity: var(--dim-opacity); }
  .filtering .layer-label { opacity: .5; }

  /* Steps panel */
  .steps {
    border-top: 1px solid var(--layer-line);
    background: var(--panel);
    max-height: 38vh; overflow-y: auto;
    padding: 14px 20px;
  }
  .steps.empty { color: var(--muted); }
  .steps h3 { margin: 0 0 4px; font-size: 15px; }
  .steps .flow-sum { color: var(--muted); font-size: 12.5px; margin: 0 0 12px; }
  ol.step-list { list-style: none; margin: 0; padding: 0; }
  ol.step-list li {
    display: grid; grid-template-columns: 26px 1fr; gap: 10px;
    padding: 8px 8px; border-radius: 8px; cursor: default;
    transition: background .12s;
  }
  ol.step-list li:hover, ol.step-list li.hot { background: var(--panel-2); }
  .step-num {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--accent); color: #0e1116;
    font-weight: 700; font-size: 12px;
    display: flex; align-items: center; justify-content: center;
  }
  ol.step-list li.hot .step-num { background: var(--hot); }
  .step-path { font-size: 12px; color: var(--muted); margin-bottom: 2px; }
  .step-path b { color: var(--text); font-weight: 600; }
  .step-path .arrow { color: var(--accent); margin: 0 5px; }
  .step-label {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px; color: var(--accent-2);
    background: #0f1a18; border: 1px solid #1d3a33;
    padding: 1px 6px; border-radius: 5px; display: inline-block; margin: 2px 0 4px;
  }
  .step-note { font-size: 13px; }

  .hint { color: var(--muted); font-size: 12px; }
  @media (max-width: 760px) {
    aside { width: 240px; }
  }
</style>
</head>
<body>
<header>
  <h1><span class="radio">📻 Ondes</span> · Component &amp; Workflow Map</h1>
  <span class="sub" id="subtitle"></span>
  <span class="pkg" id="pkg"></span>
</header>

<div class="layout">
  <aside>
    <p class="intro" id="intro"></p>
    <h2>Workflows</h2>
    <div id="flow-list"></div>
    <button class="reset" id="reset">Clear · show all components</button>
  </aside>

  <main>
    <div class="stage-wrap">
      <div id="diagram">
        <svg class="wires" id="wires" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
                    markerWidth="7" markerHeight="7" orient="auto-start-reverse">
              <path d="M0,0 L10,5 L0,10 z" fill="var(--accent)"/>
            </marker>
            <marker id="arrow-hot" viewBox="0 0 10 10" refX="9" refY="5"
                    markerWidth="7" markerHeight="7" orient="auto-start-reverse">
              <path d="M0,0 L10,5 L0,10 z" fill="var(--hot)"/>
            </marker>
          </defs>
        </svg>
        <!-- layers injected here -->
      </div>
    </div>
    <div class="steps empty" id="steps">
      <span class="hint">Pick a workflow on the left to trace it across the components.</span>
    </div>
  </main>
</div>

<!-- Inline fallback copy of workflows.json so this page also works opened directly from disk (file://). -->

  "flows": [
    {
      "id": "subscribe",
      "title": "Subscribe to a podcast",
      "summary": "From a search result (or a pasted RSS URL) to a fully reconciled show in the user's library.",
      "steps": [
        { "from": "search",     "to": "repository", "label": "subscribe(feedUrl)", "note": "SearchViewModel calls PodcastRepository.subscribe() with the chosen feed URL." },

        { "from": "workManager",    "to": "downloadWorker",  "label": "doWork() — Wi-Fi constraint honoured", "note": "WorkManager runs EpisodeDownloadWorker when constraints (e.g. Wi-Fi-only) are met, even if the app is closed." },
        { "from": "downloadWorker", "to": "repository",      "label": "updateDownload(DOWNLOADING)", "note": "Worker flips the episode's download state so the UI shows progress." },
        { "from": "downloadWorker", "to": "okhttp",          "label": "stream audio bytes", "note": "Worker streams the audio file through the shared OkHttpClient, retrying transient 429/5xx errors." },

      "steps": [
        { "from": "player",            "to": "sleepTimer",         "label": "start(durationMs) / startEndOfEpisode()", "note": "PlayerViewModel injects SleepTimer directly and arms it from the timer sheet." },
        { "from": "sleepTimer",        "to": "player",             "label": "remainingMs / endOfEpisodeArmed StateFlow", "note": "SleepTimer exposes countdown StateFlows the Player UI displays live." },
        { "from": "sleepTimer",        "to": "playbackConnection", "label": "pause() on expiry", "note": "When the countdown hits zero (or the episode ends), SleepTimer calls PlaybackConnection.pause()." },
        { "from": "playbackConnection","to": "playbackService",    "label": "MediaController.pause()", "note": "The pause is relayed to the media service." },
        { "from": "playbackService",   "to": "exoplayer",          "label": "ExoPlayer.pause()", "note": "ExoPlayer stops and the notification updates." }
      ]
    },
    {
      "id": "queue",
      "title": "Up-Next queue",
      "summary": "A persistent, reorderable play queue (\"Play next\" / \"Add to queue\").",
      "steps": [
        { "from": "queue",             "to": "repository",         "label": "addToQueueEnd / playNextInQueue / setQueueOrder", "note": "QueueViewModel mutates the queue through the repository's queue operations." },
        { "from": "repository",        "to": "room",               "label": "queueDao writes (sortIndex)", "note": "The repository persists ordering in the Room queue table, so it survives restarts." },
        { "from": "room",              "to": "queue",              "label": "observeQueue() emits", "note": "The Queue screen observes the queue Flow and re-renders on every change." },
        { "from": "queue",             "to": "playbackConnection", "label": "playFromQueue(queue, startIndex)", "note": "Starting playback hands the whole ordered queue to PlaybackConnection." },
        { "from": "playbackConnection","to": "playbackService",    "label": "setMediaItems(queue)", "note": "PlaybackService loads the queue into ExoPlayer for continuous, gapless next-up playback." }
      ]
    },
    {
      "id": "androidAuto",
      "title": "Android Auto browse & play",
      "summary": "The car head-unit browses Continue / Subscriptions / Downloads and plays hands-free.",
      "steps": [
        { "from": "androidAuto",     "to": "playbackService",  "label": "onGetLibraryRoot / onGetChildren(parentId)", "note": "Android Auto connects to PlaybackService (a MediaLibraryService) and requests the browse tree." },
        { "from": "playbackService", "to": "mediaLibraryTree", "label": "root() / children(parentId)", "note": "PlaybackService delegates browse requests to MediaLibraryTree, after verifying the caller is trusted." },
        { "from": "mediaLibraryTree","to": "repository",       "label": "getSubscriptionsOnce / inProgress / downloaded", "note": "The tree pulls the right episode lists from the repository for each folder." },
        { "from": "repository",      "to": "room",             "label": "DAO queries", "note": "Repository reads from Room." },
        { "from": "playbackService", "to": "androidAuto",      "label": "List<MediaItem> (browsable tree)", "note": "Folders + playable items are returned for the car UI to render." },
        { "from": "androidAuto",     "to": "playbackService",  "label": "onAddMediaItems → play", "note": "Selecting an item adds it to ExoPlayer and starts playback — reusing the Play flow." }
      ]
    },
    {
      "id": "onboarding",
      "title": "First-run onboarding",
      "summary": "The interest picker seeds a brand-new library from iTunes theme charts.",
      "steps": [
        { "from": "onboarding",   "to": "repository",    "label": "topPodcasts(genreId) per picked interest", "note": "OnboardingViewModel asks the repository for top shows in each interest the user picked." },
        { "from": "repository",   "to": "searchService", "label": "topPodcasts → iTunes charts", "note": "PodcastSearchService reads the genre chart (via OkHttp → iTunes) and returns suggested shows." },
        { "from": "onboarding",   "to": "repository",    "label": "subscribe(feedUrl) for chosen shows", "note": "Each show the user keeps is subscribed — reusing the Subscribe flow (parse → Room)." },
        { "from": "repository",   "to": "room",          "label": "seed library + episodes", "note": "The picked shows and their episodes are written to Room." },
        { "from": "onboarding",   "to": "settingsRepo",  "label": "mark onboarding complete", "note": "A settings flag flips so onboarding never shows again." },
        { "from": "room",         "to": "home",          "label": "observeLatest() emits", "note": "Home immediately shows the latest episodes from the freshly-seeded library." }
      ]
    }
  ]
}
</script>

<script>
(function () {
  "use strict";

  var data = null;
  var activeFlow = null;
  var nodeEls = {};        // id -> element
  var wires = document.getElementById("wires");

  // ---- Load data: prefer external workflows.json, fall back to embedded copy ----
  function loadData() {
    return fetch("workflows.json", { cache: "no-store" })
      .then(function (r) { if (!r.ok) throw new Error(r.status); return r.json(); })
      .catch(function () {
        return JSON.parse(document.getElementById("embedded-data").textContent);
      });
  }

  function el(tag, cls, html) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html != null) e.innerHTML = html;
    return e;
  }

  function buildDiagram() {
    document.getElementById("subtitle").textContent = data.meta.subtitle || "";
    document.getElementById("pkg").textContent = data.meta.package || "";
    document.getElementById("intro").textContent = data.meta.description || "";

    var diagram = document.getElementById("diagram");
    data.layers.forEach(function (layer) {
      var wrap = el("div", "layer");
      wrap.appendChild(el("div", "layer-label", layer.label));
      var row = el("div", "layer-nodes");
      data.nodes.filter(function (n) { return n.layer === layer.id; })
        .forEach(function (n) {
          var node = el("div", "node");
          node.dataset.id = n.id;
          node.appendChild(el("div", "nl", n.label));
          node.appendChild(el("div", "ns", n.sub));
          row.appendChild(node);
          nodeEls[n.id] = node;
        });
      wrap.appendChild(row);
      diagram.appendChild(wrap);
    });

    var list = document.getElementById("flow-list");
    data.flows.forEach(function (f) {
      var b = el("button", "flow-btn");
      b.dataset.id = f.id;
      b.appendChild(el("div", "t", f.title));
      b.appendChild(el("div", "s", f.summary));
      b.addEventListener("click", function () { selectFlow(f.id); });
      list.appendChild(b);
    });

    document.getElementById("reset").addEventListener("click", clearFlow);
  }

  function clearFlow() {
    activeFlow = null;
    document.querySelectorAll(".flow-btn").forEach(function (b) { b.classList.remove("active"); });
    document.getElementById("diagram").classList.remove("filtering");
    Object.values(nodeEls).forEach(function (n) { n.classList.remove("active", "endpoint"); });
    clearWires();
    var steps = document.getElementById("steps");
    steps.className = "steps empty";
    steps.innerHTML = '<span class="hint">Pick a workflow on the left to trace it across the components.</span>';
  }

  function selectFlow(id) {
    var flow = data.flows.find(function (f) { return f.id === id; });
    if (!flow) return;
    activeFlow = flow;

    document.querySelectorAll(".flow-btn").forEach(function (b) {
      b.classList.toggle("active", b.dataset.id === id);
    });

    // Highlight involved nodes
    document.getElementById("diagram").classList.add("filtering");
    Object.values(nodeEls).forEach(function (n) { n.classList.remove("active", "endpoint"); });
    var involved = {};
    flow.steps.forEach(function (s) { involved[s.from] = true; involved[s.to] = true; });
    Object.keys(involved).forEach(function (nid) {
      if (nodeEls[nid]) nodeEls[nid].classList.add("active");
    });
    // Mark the very first source and the last destination as endpoints
    nodeEls[flow.steps[0].from] && nodeEls[flow.steps[0].from].classList.add("endpoint");

    renderSteps(flow);
    drawWires(flow);
  }

  function renderSteps(flow) {
    var steps = document.getElementById("steps");
    steps.className = "steps";
    steps.innerHTML = "";
    steps.appendChild(el("h3", null, flow.title));
    steps.appendChild(el("p", "flow-sum", flow.summary));
    var ol = el("ol", "step-list");
    flow.steps.forEach(function (s, i) {
      var li = el("li");
      li.dataset.idx = i;
      var num = el("div", "step-num", String(i + 1));
      var body = el("div");
      var fromN = nodeName(s.from), toN = nodeName(s.to);
      body.appendChild(el("div", "step-path",
        "<b>" + fromN + "</b><span class='arrow'>→</span><b>" + toN + "</b>"));
      body.appendChild(el("span", "step-label", escapeHtml(s.label)));
      body.appendChild(el("div", "step-note", escapeHtml(s.note)));
      li.appendChild(num);
      li.appendChild(body);
      li.addEventListener("mouseenter", function () { highlightStep(i, true); });
      li.addEventListener("mouseleave", function () { highlightStep(i, false); });
      ol.appendChild(li);
    });
    steps.appendChild(ol);
  }

  function nodeName(id) {
    var n = data.nodes.find(function (x) { return x.id === id; });
    return n ? n.label : id;
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"]/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
    });
  }

  // ---- Wire drawing ----
  function clearWires() {
    Array.prototype.slice.call(wires.querySelectorAll(".wire, .badge"))
      .forEach(function (n) { n.remove(); });
  }

  // Intersection of the segment center->target with the target rect's border.
  function edgePoint(rect, cx, cy, tx, ty) {
    var dx = tx - cx, dy = ty - cy;
    var hw = rect.w / 2, hh = rect.h / 2;
    if (dx === 0 && dy === 0) return { x: tx, y: ty };
    var scaleX = dx !== 0 ? hw / Math.abs(dx) : Infinity;
    var scaleY = dy !== 0 ? hh / Math.abs(dy) : Infinity;
    var scale = Math.min(scaleX, scaleY);
    return { x: tx - dx * scale, y: ty - dy * scale };
  }

  function rectOf(id, base) {
    var r = nodeEls[id].getBoundingClientRect();
    return {
      x: r.left - base.left, y: r.top - base.top,
      w: r.width, h: r.height,
      cx: r.left - base.left + r.width / 2,
      cy: r.top - base.top + r.height / 2
    };
  }

  function drawWires(flow) {
    clearWires();
    var base = document.getElementById("diagram").getBoundingClientRect();
    var SVGNS = "http://www.w3.org/2000/svg";

    // Track repeated pairs so overlapping arrows fan out.
    var pairCount = {};

    flow.steps.forEach(function (s, i) {
      var a = rectOf(s.from, base), b = rectOf(s.to, base);
      var key = [s.from, s.to].sort().join("__");
      var seen = pairCount[key] || 0;
      pairCount[key] = seen + 1;

      var start = edgePoint(a, b.cx, b.cy, a.cx, a.cy);
      var end = edgePoint(b, a.cx, a.cy, b.cx, b.cy);

      // Perpendicular bow so multiple arrows / long jumps don't overlap.
      var mx = (start.x + end.x) / 2, my = (start.y + end.y) / 2;
      var vx = end.x - start.x, vy = end.y - start.y;
      var len = Math.hypot(vx, vy) || 1;
      var nx = -vy / len, ny = vx / len;
      var bow = 26 + seen * 34;
      // Bias bow direction by horizontal travel so adjacent flows read cleanly.
      var dir = (s.from.charCodeAt(0) % 2 === 0) ? 1 : -1;
      if (seen % 2 === 1) dir *= -1;
      var ctrlX = mx + nx * bow * dir, ctrlY = my + ny * bow * dir;

      var d = "M" + start.x + "," + start.y + " Q" + ctrlX + "," + ctrlY + " " + end.x + "," + end.y;
      var path = document.createElementNS(SVGNS, "path");
      path.setAttribute("d", d);
      path.setAttribute("class", "wire");
      path.setAttribute("marker-end", "url(#arrow)");
      var pathLen = Math.hypot(vx, vy) + bow; // approx for dash animation
      path.style.setProperty("--len", pathLen);
      path.style.animationDelay = (i * 0.08) + "s";
      path.dataset.idx = i;
      wires.appendChild(path);

      // Numbered badge at the curve apex (t = 0.5 on quadratic).
      var bxq = 0.25 * start.x + 0.5 * ctrlX + 0.25 * end.x;
      var byq = 0.25 * start.y + 0.5 * ctrlY + 0.25 * end.y;
      var g = document.createElementNS(SVGNS, "g");
      g.setAttribute("class", "badge");
      g.dataset.idx = i;
      var c = document.createElementNS(SVGNS, "circle");
      c.setAttribute("cx", bxq); c.setAttribute("cy", byq); c.setAttribute("r", 10);
      var t = document.createElementNS(SVGNS, "text");
      t.setAttribute("x", bxq); t.setAttribute("y", byq + 4);
      t.setAttribute("text-anchor", "middle");
      t.textContent = String(i + 1);
      g.appendChild(c); g.appendChild(t);
      wires.appendChild(g);

      // Hover the badge to spotlight its step.
      g.style.pointerEvents = "all";
      g.style.cursor = "pointer";
      g.addEventListener("mouseenter", function () { highlightStep(i, true); });
      g.addEventListener("mouseleave", function () { highlightStep(i, false); });
    });
  }

  function highlightStep(idx, on) {
    var wire = wires.querySelector('.wire[data-idx="' + idx + '"]');
    var badge = wires.querySelector('.badge[data-idx="' + idx + '"]');
    var li = document.querySelector('.step-list li[data-idx="' + idx + '"]');
    if (wire) wire.classList.toggle("hot", on);
    if (wire) wire.setAttribute("marker-end", on ? "url(#arrow-hot)" : "url(#arrow)");
    if (badge) badge.classList.toggle("hot", on);
    if (li) li.classList.toggle("hot", on);
  }

  // Redraw wires when layout changes.
  var resizeTimer;
  window.addEventListener("resize", function () {
    if (!activeFlow) return;
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function () { drawWires(activeFlow); }, 120);
  });
  document.querySelector(".stage-wrap").addEventListener("scroll", function () {
    // wires are positioned inside #diagram, so they scroll with it — no redraw needed.
  });

  loadData().then(function (d) {
    data = d;
    buildDiagram();
  });
})();
</script>
</body>
</html>
